<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles.css">
    
</head>
<body class="bg-[url(https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTVwVOX33CP_VlJFItU4EiL0CdPOK0q6uPl7g&s)] bg-cover">
    <header class="bg-zinc-800 h-26">
        <h1 class="text-white text-5xl">Name of the quiz</h1>
    </header>
    <header class="bg-zinc-700">
        <h1 id="question" class="text-white text-2xl">Question</h1>
    </header>
    <br>
    <div>
        <h3 class="text-white text-right">x/y question</h3>
    </div>
    <br>
    <br>
    <br>
    <br>
    <br>

    <label>
        <div id="answers" class="sans-font flex flex-col items-center gap-3">
            
        </div>
    </label>
    <script>
        fetch("quiz-questions.json")
        .then(function (response) {
                return response.json();
            })
        .then(function(data){
            var question = data.questions[1];
        
        var question_element = document.getElementById("question");

        question_element.textContent = question.text;

        if (question.image){

        var img = document.createElement("img")
        img.src = question.image;
        
        question_element.appendChild(img)
        }
        

        var answersBox = document.getElementById("answers")

        answersBox.innerHTML = "";

        question.answers.forEach(addButtons);

        function addButtons(answer) {
            if (answer.text){

            var button = document.createElement("input");
            button.type = "submit";
            button.value = answer.text;
            button.id = answer.correct
            button.addEventListener("click", buttonPressed);
            
            button.className = "text-white font-mono bg-blue-950 text-3xl block mx-auto my-2";


            answersBox.appendChild(button);
            }
            
            if (answer.image){
                var img = document.createElement("img")
                img.src = answer.image;

                answersBox.appendChild(img)

            }
        }

        function buttonPressed(event){
            button = event.currentTarget
            alert("id = " +button.id)
        }
        


        // document.getElementById("questionImage").src.question.image;

        })

        .catch(function (error){
            console.error("Could not load the JSON:", error);
        })

    </script>
</body>
</html>
