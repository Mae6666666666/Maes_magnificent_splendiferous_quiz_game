<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
</head>
<body class="bg-[url(https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTVwVOX33CP_VlJFItU4EiL0CdPOK0q6uPl7g&s)] bg-cover">
    <header class="bg-zinc-800 h-26">
        <h1 class="text-white text-5xl font-mono">Name of the quiz</h1>
    </header>
    <header class="bg-zinc-700">
        <h1 id="question" class="text-white font-mono text-2xl">Question</h1>
    </header>
    <br>
    <div>
        <h3 class="text-white font-mono text-right">x/y question</h3>
    </div>
    <br>
    <br>
    <br>
    <br>
    <br>

    <label>
        <div class="text-center">
            <input class="text-white font-mono bg-blue-950 text-3xl" id="a1" type="submit" name="selection" value="answer 1">
            <br>
            <br>
            <input class="text-white font-mono bg-blue-950 text-3xl" id="a2" type="submit" name="selection" value="answer 2">
            <br>
            <br>
            <input class="text-white font-mono bg-blue-950 text-3xl" id="a3" type="submit" name="selection" value="answer 3">
            <br>
            <br>
            <input class="text-white font-mono bg-blue-950 text-3xl" id="a4" type="submit" name="selection" value="answer 4">
        </div>
    </label>
    <script>
        fetch("quiz-questions.json")
        .then(function (response) {
                return response.json();
            })
        .then(function(data){
            var answer1 = data.questions[2].answers[0];
            var answer2 = data.questions[2].answers[1];
            var answer3 = data.questions[2].answers[2];
            var answer4 = data.questions[2].answers[3];
            var question = data.questions[2].text;
        
        document.getElementById("question").textContent = question;
        
        document.getElementById("a1").value = answer1.text;

        document.getElementById("a2").value = answer2.text;

        document.getElementById("a3").value = answer3.text;
        
        document.getElementById("a4").value = answer4.text;


        document.getElementById("questionImage").src.question.image;

        })

        .catch(function (error){
            console.error("Could not load the JSON:", error);
        })

    </script>
</body>
</html>
