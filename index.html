<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body
    class="bg-[url(https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTVwVOX33CP_VlJFItU4EiL0CdPOK0q6uPl7g&s)] bg-cover"
  >
    <header class="bg-zinc-800 h-26">
      <h1 class="text-white text-5xl">Name of the quiz</h1>
    </header>
    <header class="bg-zinc-700">
      <h1 id="question" class="text-white text-2xl">Question</h1>
    </header>
    <br />
    <div>
      <h3 id="questionCount" class="text-white text-right">x/y quest. ion</h3>
    </div>
    <br />
    <br />
    <br />
    <br />
    <br />

    <div id="answers" class="sans-font flex flex-col items-center gap-3"></div>

    <script>
      let LOCAL_STORED_ANSWERS = "localStoredAnswers";

      localStorage.setItem("currentQ", 0);
      var storedAnswers = [];
      localStorage.setItem(LOCAL_STORED_ANSWERS, JSON.stringify(storedAnswers));

      var questions = {};
      fetch("quiz-questions.json") //5s
        .then(function (response) {
          return response.json();
        })
        .then(function (data) {
          aLog("loadQuestionswhy");
          questions = data.questions;

          let currentQ = localStorage.getItem("currentQ");
          displayQuestion(currentQ);
          displayAnswers(currentQ);

          var question = questions[currentQ];
          questionTracker(1);
        })

        .catch(function (error) {
          console.error("Could not load the JSON:", error);
        });

      function displayQuestion(questionNumber) {
        var question = questions[questionNumber];

        var question_element = document.getElementById("question");

        question_element.textContent = question.text;

        if (question.image) {
          var img = document.createElement("img");
          img.src = question.image;

          question_element.appendChild(img);
        }
      }

      function displayAnswers(answerQNumber) {
        // aLog("displayAnswers");
        var question = questions[answerQNumber];

        var answersBox = document.getElementById("answers");

        answersBox.innerHTML = "";

        question.answers.forEach(addButtons);
        //console.log("totalQuestions: " + totalQuestions);
      }

      function addButtons(answer) {
        var answersBox = document.getElementById("answers");

        if (answer.text) {
          var button = document.createElement("input");
          button.type = "submit";
          button.value = answer.text;
          button.id = answer.correct;
          //button.addEventListener("click", buttonPressed);
          button.onclick = buttonPressed;
          button.className =
            "text-white font-mono bg-blue-950 text-3xl block mx-auto my-2";

          answersBox.appendChild(button);
        }

        if (answer.image) {
          var img = document.createElement("img");
          img.onclick = buttonPressed;
          img.src = answer.image;
          img.id = answer.correct;
          answersBox.appendChild(img);
        }
      }
      // get length of list which is question!!!
      // let currentQCount = 0
      // let totalQuestions = length of the list containing questions

      function buttonPressed(event, totalQuestions) {
        // aLog("buttonPressed");
        let currentQ = Number(localStorage.getItem("currentQ"));
        currentQ += 1;
        console.log("currentQ: " + currentQ);
        questionTracker(currentQ + 1);

        button = event.currentTarget;
        var localDataStr = localStorage.getItem(LOCAL_STORED_ANSWERS);
        var localDataArr = JSON.parse(localDataStr);
        localDataArr.push(button.id);
        localStorage.setItem(
          LOCAL_STORED_ANSWERS,
          JSON.stringify(localDataArr),
        );
        if (Number(currentQ) <= questions.length - 1) {
        } else {
          window.location.href = "summary.html";
          return;
        }
        // console.log("Current q: " + currentQ);

        localStorage.setItem("currentQ", currentQ);

        displayQuestion(currentQ);
        displayAnswers(currentQ);
      }
      function questionTracker(questionCurrent) {
        let totalQuestions = questions.length;
        questionCount = document.getElementById("questionCount");
        questionCount.innerText = questionCurrent + "/" + totalQuestions;
      }
      function aLog(msg) {
        console.log(msg);
      }
    </script>
  </body>
</html>
